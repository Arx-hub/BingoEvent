version: '3.8'

services:
  # API Service
  bingo-api:
    build:
      context: ./API_folder
      dockerfile: Dockerfile
    container_name: bingo_api_container
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      # Bind mount for database persistence - maps local directory to container
      - ./database:/app/Data
      - ./API_folder/BingoEvent.db:/app/BingoEvent.db
    networks:
      - bingo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Guest Side Service
  bingo-guest:
    build:
      context: ./bingo_event_guest_side
      dockerfile: Dockerfile
    container_name: bingo_guest_container
    ports:
      - "8081:80"
    networks:
      - bingo-network
    environment:
      - API_URL=http://bingo-api:8080/api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    depends_on:
      - bingo-api

  # Administrator Side Service
  bingo-admin:
    build:
      context: ./bingo_event_administrator_side
      dockerfile: Dockerfile
    container_name: bingo_admin_container
    ports:
      - "8082:80"
    networks:
      - bingo-network
    environment:
      - API_URL=http://bingo-api:8080/api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    depends_on:
      - bingo-api

networks:
  bingo-network:
    driver: bridge

volumes:
  database:
    driver: local
